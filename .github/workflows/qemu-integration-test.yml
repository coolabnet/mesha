name: QEMU Integration Test

on:
  pull_request:
    paths:
      - 'adapters/mesh/**'
      - 'skills/mesh-readonly/**'
      - 'skills/mesh-rollout/**'
      - 'scripts/libremesh-lab.sh'
      - 'tests/qemu/**'
  schedule:
    - cron: '0 3 * * *'  # nightly at 03:00 UTC
  workflow_dispatch:  # manual trigger

jobs:
  qemu-test:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - name: Checkout libremesh-lab
        uses: actions/checkout@v4
        with:
          repository: coolabnet/libremesh-lab
          path: libremesh-lab
          ref: main

      - name: Install QEMU and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 qemu-utils cmake g++ pkg-config \
            libnl-3-dev libnl-genl-3-dev iproute2 \
            python3-yaml jq

      - name: Cache firmware image
        uses: actions/cache@v4
        with:
          path: libremesh-lab/images/
          key: libremesh-x86-64-${{ hashFiles('libremesh-lab/bin/libremesh-lab') }}

      - name: Build firmware (if not cached)
        timeout-minutes: 240
        run: |
          export LIBREMESH_LAB_ROOT="${{ github.workspace }}/libremesh-lab"
          if [ ! -f libremesh-lab/images/*.img.gz ]; then
            echo "::group::Building LibreMesh firmware (2-4 hours)..."
            bash scripts/libremesh-lab.sh build
            echo "::endgroup::"
          else
            echo "Using cached firmware image"
          fi

      - name: Start test bed
        run: |
          export LIBREMESH_LAB_ROOT="${{ github.workspace }}/libremesh-lab"
          bash scripts/libremesh-lab.sh start

      - name: Configure VMs
        run: |
          export LIBREMESH_LAB_ROOT="${{ github.workspace }}/libremesh-lab"
          bash scripts/libremesh-lab.sh configure
        timeout-minutes: 10

      - name: Run integration tests
        run: bash tests/qemu/run-all.sh
        timeout-minutes: 15
        env:
          CONVERGE_WAIT: "45"
          LIBREMESH_LAB_ROOT: "${{ github.workspace }}/libremesh-lab"

      - name: Collect logs
        if: always()
        run: |
          export LIBREMESH_LAB_ROOT="${{ github.workspace }}/libremesh-lab"
          bash scripts/libremesh-lab.sh logs || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-test-logs
          path: libremesh-lab/run/logs/
          retention-days: 7

      - name: Stop test bed
        if: always()
        run: |
          export LIBREMESH_LAB_ROOT="${{ github.workspace }}/libremesh-lab"
          bash scripts/libremesh-lab.sh stop || true
