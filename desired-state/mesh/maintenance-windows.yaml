# desired-state/mesh/maintenance-windows.yaml
#
# Scheduled maintenance windows for mesh network operations.
#
# Managed by: skills/mesh-rollout/scripts/schedule-maintenance.sh
# Do not edit manually while an add or cancel operation is in progress.
#
# Schema per window:
#   id               — unique slug (timestamp-based), e.g. maint-20260323T220000
#   scheduled_at     — start date and time: "YYYY-MM-DD HH:MM"
#   duration_minutes — length of the window in minutes
#   scope            — what the window covers:
#                        ring:<name>       one upgrade ring (canary, stable, trailing)
#                        node:<hostname>   a single node
#                        all               all nodes / the entire mesh
#   description      — plain-language description of the planned work
#   created_by       — username of the maintainer who scheduled this window
#   created_at       — ISO 8601 timestamp when this entry was created
#   status           — scheduled | active | completed | cancelled
#   notes            — optional free-text field for context or outcome notes
#
# Risk class:
#   Scheduling a window (add/cancel) is Class B — low-risk write.
#   The window itself governs when Class D operations may execute.
#
# See: desired-state/mesh/community-profile/rollout-policy.yaml — change_windows
#      TOOLS.md — Class B approval requirements

