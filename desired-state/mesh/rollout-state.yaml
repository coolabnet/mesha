# desired-state/mesh/rollout-state.yaml
#
# State tracking file for the current or most recent firmware rollout.
#
# This file is written and updated by:
#   skills/mesh-rollout/scripts/run-rollout.sh
#
# Schema:
#   rollout_id       — timestamp-based unique identifier for this rollout
#   firmware_url     — the firmware URL or local path used
#   started_at       — ISO 8601 timestamp when the rollout began
#   completed_at     — ISO 8601 timestamp when the rollout completed (null if not done)
#   halted_at        — ISO 8601 timestamp when the rollout halted on failure (null if not halted)
#   status           — pending | in_progress | completed | halted
#   rings            — list of rings, each containing a list of nodes with per-node status
#
# Node status values:
#   pending    — not yet started
#   upgraded   — sysupgrade applied, waiting for validation
#   validated  — post-upgrade validation passed
#   failed     — upgrade or validation failed; rollout halted at this node
#
# When status is "completed" or "halted", this file represents the last rollout.
# When status is "in_progress", a rollout is actively running.
# When status is "pending", a rollout has been planned but not yet started.
#
# Do not edit this file manually during an active rollout (status: in_progress).
# For a halted rollout, use --resume with run-rollout.sh after fixing the issue.

# No firmware rollouts have been performed on the confirmed nodes yet.
# When a rollout is planned, populate this file with the real node hostnames from
# inventories/mesh-nodes.yaml: porao, yuri, marie, carlinhos

rollout_id: null
firmware_url: null
started_at: null
completed_at: null
halted_at: null
status: pending
rings: []
