# inventories/gateways.yaml
# Gateway nodes — mesh nodes that have an uplink to the internet or upstream WAN.
#
# A gateway node is a mesh node with role: gateway in mesh-nodes.yaml.
# This file adds uplink-specific detail not relevant to other node types.
#
# Fields:
#   node          — must match a name in mesh-nodes.yaml
#   hostname      — repeated here for quick reference
#   uplink_type   — fiber | cable | 4g | 5g | vsat | fixed-wireless | adsl
#   uplink_isp    — name of the provider
#   uplink_speed  — contracted speed in Mbit/s (down/up)
#   uplink_ip     — current WAN IP (may be dynamic; mark as dhcp if so)
#   backup_uplink — secondary uplink if present (same sub-fields)
#   priority      — lower number = preferred gateway in BMX7/babeld election
#   status        — online | offline | degraded
#   notes

gateways: []
