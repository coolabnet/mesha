# inventories/gateways.yaml
# Gateway nodes — mesh nodes that have an uplink to the internet or upstream WAN.
#
# A gateway node is a mesh node with role: gateway in mesh-nodes.yaml.
# This file adds uplink-specific detail not relevant to other node types.
#
# Fields:
#   node          — must match a name in mesh-nodes.yaml
#   hostname      — repeated here for quick reference
#   uplink_type   — fiber | cable | 4g | 5g | vsat | fixed-wireless | adsl
#   uplink_isp    — name of the provider
#   uplink_speed  — contracted speed in Mbit/s (down/up)
#   uplink_ip     — current WAN IP (may be dynamic; mark as dhcp if so)
#   backup_uplink — secondary uplink if present (same sub-fields)
#   priority      — lower number = preferred gateway in BMX7/babeld election
#   status        — online | offline | degraded
#   notes

gateways:
  - node: "Escola Municipal - Telhado"
    hostname: "lm-escola-telhado"
    uplink_type: fiber
    uplink_isp: "Prefeitura Municipal (fibra pública)"
    uplink_speed:
      down_mbps: 100
      up_mbps: 50
    uplink_ip: dhcp
    backup_uplink:
      uplink_type: 4g
      uplink_isp: "Claro Brasil"
      uplink_speed:
        down_mbps: 20
        up_mbps: 10
      notes: "4G dongle on USB port. Auto-failover configured in LibreMesh mwan3."
    priority: 10
    status: online
    notes: >
      Primary internet gateway for the whole mesh. Fiber drops occasionally
      on rainy days — suspected cable entry issue at the rooftop junction box.
      4G backup has been tested and works. Check mwan3 status after fiber
      incidents to confirm correct failover and recovery.

  - node: "Clínica do Bairro - Antena"
    hostname: "lm-clinica-antena"
    uplink_type: fixed-wireless
    uplink_isp: "Provedor Local Aeronet"
    uplink_speed:
      down_mbps: 15
      up_mbps: 5
    uplink_ip: "192.168.100.254"  # static from ISP
    backup_uplink: null
    priority: 20
    status: degraded
    notes: >
      Secondary gateway. Lower priority than escola-telhado.
      Currently degraded due to weak link to the mesh backbone.
      ISP uplink itself is healthy; the problem is mesh-side signal.
      If escola-telhado goes down, this gateway will carry full traffic
      but throughput will be limited. No backup uplink — single point of
      failure if the main gateway is down and mesh route here is also broken.
