# inventories/sites.yaml
# Physical sites in the community where mesh nodes are installed.
#
# Fields:
#   name        — matches the site field in mesh-nodes.yaml
#   location    — human-readable street or neighborhood description
#   coordinates — GPS lat/lon for map display and line-of-sight planning
#   nodes       — list of node names installed at this site (matches mesh-nodes.yaml name)
#   contact     — local person responsible for physical access
#   power       — power source description (grid, UPS, solar, unknown)
#   notes       — anything useful for field visits or incident triage

sites:
  - name: "Associação Portal Sem Porteiras"
    location: "Praça Central s/n, Bairro Novo"
    coordinates:
      lat: -15.8025
      lon: -47.9340
    nodes:
      - "Porão da PSP"
      - "Yuri - NanoStation AC"
      - "Marie - TL-WDR3500"
      - "Carlinhos - CPE210"
      - "Escola Municipal - Telhado"
    contact:
      name: "Presidente Marcos"
      phone: "+55 61 99800-0003"
    power: "grid + UPS"
    notes: >
      Community hub with active mesh network. Used mainly for weekly meetings (Thursdays 19h).
      UPS provides about 30 min backup. Key held by Marcos and one deputy. Dense mesh topology
      with 22+ originators and multiple relay paths. Basement node provides full-building coverage.
