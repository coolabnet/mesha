services:
  # ---------------------------------------------------------------------------
  # Prometheus — time-series metrics collection
  # Local domain: metricas.bairro.local (behind reverse proxy)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ../../../../desired-state/server/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../../../desired-state/server/monitoring/alerting-rules.yaml:/etc/prometheus/alerting-rules.yaml:ro
      - prometheus-data:/prometheus
    networks:
      - community-net
    # No port published to host — access via reverse proxy only.
    # Internal port: 9090

  # ---------------------------------------------------------------------------
  # Grafana — dashboard visualization
  # Local domain: grafana.bairro.local (behind reverse proxy)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-change-me-grafana}"
      GF_SECURITY_SECRET_KEY: "${GF_SECRET_KEY:-change-me-secret-key}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://grafana.bairro.local"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/community-overview.json"
    volumes:
      - grafana-data:/var/lib/grafana
      # Provisioned datasource — auto-connects Grafana to Prometheus
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      # Provisioned dashboard folder — auto-loads community-overview dashboard
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../../../desired-state/server/monitoring/grafana-dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - community-net
    depends_on:
      - prometheus
    # No port published to host — access via reverse proxy only.
    # Internal port: 3000

  # ---------------------------------------------------------------------------
  # Node Exporter — host system metrics (CPU, memory, disk, network)
  # Scraped by Prometheus at servidor.bairro.local:9100
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    pid: host
    networks:
      - community-net
    # Exposes port 9100 on community-net for Prometheus scraping.
    # Not published to host directly.

  # ---------------------------------------------------------------------------
  # Blackbox Exporter — HTTP health probing for community services
  # Used by the community-services scrape job in prometheus.yml
  # ---------------------------------------------------------------------------
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - ./blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
      - community-net
    # Internal port: 9115

volumes:
  prometheus-data:
    name: prometheus-data
  grafana-data:
    name: grafana-data

networks:
  community-net:
    external: true
