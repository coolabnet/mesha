# Partition topology: starts as full mesh, intended for partition testing
# All nodes connected initially; vwifi-ctrl can partition by setting distant coordinates
mesh:
  nodes:
    - id: 1
      hostname: lm-testbed-node-1
      ip: 10.99.0.11
      tap_index: 0
      mac_mesh: "52:54:00:00:00:01"
      mac_wan: "52:54:00:01:00:01"
      role: gateway
      ram_mb: 256
    - id: 2
      hostname: lm-testbed-node-2
      ip: 10.99.0.12
      tap_index: 1
      mac_mesh: "52:54:00:00:00:02"
      mac_wan: "52:54:00:01:00:02"
      role: relay
      ram_mb: 256
    - id: 3
      hostname: lm-testbed-node-3
      ip: 10.99.0.13
      tap_index: 2
      mac_mesh: "52:54:00:00:00:03"
      mac_wan: "52:54:00:01:00:03"
      role: leaf
      ram_mb: 256
    - id: 4
      hostname: lm-testbed-tester
      ip: 10.99.0.14
      tap_index: 3
      mac_mesh: "52:54:00:00:00:04"
      mac_wan: "52:54:00:01:00:04"
      role: tester
      ram_mb: 512
  vwifi:
    server_port: 8211
    tcp_port: 8212
    spy_port: 8213
    control_port: 8214
    listen_address: "10.99.0.254"
    packet_loss: 0.0
  network:
    bridge_name: "mesha-br0"
    bridge_ip: "10.99.0.254"
    management_subnet: "10.99.0.0/16"
    tap_prefix: "mesha-tap"
    thisnode_alias: "lm-testbed-node-1"
  topology:
    type: full-mesh
    description: "Full mesh for partition testing"
